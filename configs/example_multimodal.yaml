# python -m mb.finetune.run --config config.yaml

model:
  model_name: clip    # qwen | blip | clip | gemma
  model_id: openai/clip-vit-base-patch32    # HuggingFace model ID
  task_type: image_text_to_text
  load_in_4bit: true
  use_flash_attention: true
  torch_dtype: float16
  device_map: auto
  trust_remote_code: true
  lora:
    enabled: true
    r: 16
    lora_alpha: 32
    lora_dropout: 0.05
    target_modules: ["q_proj", "v_proj"]
    bias: none
    task_type: CAUSAL_LM

data:
  input_type: multimodal        # text | multimodal
  output_type: clip_output_label     # text | text_description
  train_path: /home/malav/Desktop/mb_packages/mb_finetune/data/train.parquet
  val_path: /home/malav/Desktop/mb_packages/mb_finetune/data/val.parquet
  image_dir: /home/malav/Desktop/mb_packages/mb_finetune/data/sample_data
  text_column: query
  image_column: newfood_local_file_titan
  target_column: main_tags
  description_column: response
  max_length: 512
  image_size: 256
  prompt_template: "Answer the following question about the image: {text}"

train:
  num_epochs: 3
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 2.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.1
  lr_scheduler_type: cosine
  max_grad_norm: 1.0
  fp16: false
  bf16: true
  gradient_checkpointing: true
  save_steps: 500
  eval_steps: 500
  logging_steps: 10
  seed: 42
  dataloader_num_workers: 4
  optim: adamw_torch

output:
  output_dir: ./output/clip_vl_finetune
  save_total_limit: 3
  push_to_hub: false
  logging_dir: ./logs
  report_to: tensorboard
