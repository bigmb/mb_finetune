# python -m mb.finetune.run --config config.yaml

model:
  model_name: smolvlm    # qwen | blip | clip | gemma | smolvlm
  model_id: HuggingFaceTB/SmolVLM2-256M-Video-Instruct    # HuggingFace model ID
  task_type: image_text_to_text
  load_in_4bit: false
  use_flash_attention: true
  torch_dtype: bfloat16
  device_map: auto
  trust_remote_code: true
  lora:
    enabled: true
    r: 16
    lora_alpha: 32
    lora_dropout: 0.05
    target_modules: ["q_proj", "v_proj"]
    bias: none
    task_type: CAUSAL_LM

data:
  input_type: multimodal        # text | multimodal
  output_type: text     # text | text_description
  train_path: /home/malav/Desktop/mb_packages/mb_finetune/data/train_data2.csv
  val_path: 
  image_dir: 
  text_column: query
  image_column: new_local_path_pc
  target_column: response
  description_column: response
  max_length: 2048
  image_size: 256
  prompt_template: "{text}"

train:
  num_epochs: 3
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 2.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.1
  lr_scheduler_type: cosine
  max_grad_norm: 1.0
  fp16: false
  bf16: true
  gradient_checkpointing: true
  save_steps: 500
  eval_steps: 500
  logging_steps: 10
  seed: 42
  dataloader_num_workers: 4
  optim: adamw_torch

output:
  output_dir: ./output/smolvlm2_finetune
  save_total_limit: 3
  push_to_hub: false
  logging_dir: ./logs
  report_to: tensorboard
